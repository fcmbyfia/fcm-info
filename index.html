<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>FCM技能検定 情報サイト</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#FFFFFF;--surface:#F6F8FA;--card:#FFFFFF;--border:#D0D7DE;
  --text:#1F2328;--text-sub:#4B5563;--text-dim:#6B7280;--accent:#2563EB;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0F1117;--surface:#181C27;--card:#1E2335;--border:#2A3050;
    --text:#E8EAF0;--text-sub:#8B95B5;--text-dim:#5A638A;--accent:#4B7BF5;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);
  line-height:1.6;-webkit-font-smoothing:antialiased;padding:28px 16px 48px;}
.wrap{max-width:560px;margin:0 auto;}

.eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;
  color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;}
.title{font-size:23px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px;}
.lead{font-size:13px;color:var(--text-sub);line-height:1.8;margin-bottom:22px;}

.list{display:flex;flex-direction:column;gap:10px;}
.nav-card{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;
  background:var(--card);border:1px solid var(--border);border-left:4px solid var(--pc,var(--accent));
  border-radius:12px;padding:16px 16px;transition:border-color .18s,transform .12s,box-shadow .18s;}
.nav-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);transform:translateY(-1px);}
.nav-card:focus-visible{outline:2px solid var(--pc,var(--accent));outline-offset:2px;}
.ic{font-size:24px;line-height:1;flex:0 0 auto;width:34px;text-align:center;}
.body{flex:1 1 auto;min-width:0;}
.label{font-size:15px;font-weight:700;color:var(--text);}
.sub{font-size:12px;color:var(--text-sub);margin-top:1px;}
.arrow{flex:0 0 auto;color:var(--text-dim);font-size:15px;}

.soon{display:flex;align-items:center;gap:14px;
  background:var(--surface);border:1px dashed var(--border);
  border-radius:12px;padding:16px 16px;opacity:.7;}
.soon .label{color:var(--text-sub);}
.soon .tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;
  color:var(--text-dim);border:1px solid var(--border);border-radius:4px;padding:2px 7px;flex:0 0 auto;}

.sec-h{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.1em;
  color:var(--text-dim);text-transform:uppercase;margin:24px 0 10px;}

.foot{margin-top:28px;padding-top:16px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text-dim);line-height:1.7;text-align:center;}

@media(max-width:380px){
  .title{font-size:20px;}
  .nav-card,.soon{padding:14px 13px;gap:11px;}
}
@media(prefers-reduced-motion:reduce){
  .nav-card{transition:none;}
  .nav-card:hover{transform:none;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="eyebrow">FCM Skill Test</div>
  <h1 class="title">FCM技能検定 情報サイト</h1>
  <p class="lead">FCM技能検定（厚生労働省所管の国家資格）の学習・情報をまとめた、一般社団法人日本フィットネス産業協会（FIA）の情報サイトです。</p>

  <div class="sec-h">コンテンツ</div>
  <nav class="list">

    <a class="nav-card" style="--pc:#2563EB" href="navi/">
      <span class="ic">📚</span>
      <span class="body"><span class="label">Web学習ナビ</span><span class="sub">職種別に、3級・2級の現状把握チェックと学習モードに進めます</span></span>
      <span class="arrow">›</span>
    </a>

    <div class="soon">
      <span class="ic">❓</span>
      <span class="body"><span class="label">よくある質問（FAQ）</span><span class="sub">準備中</span></span>
      <span class="tag">SOON</span>
    </div>

    <div class="soon">
      <span class="ic">📖</span>
      <span class="body"><span class="label">用語集</span><span class="sub">準備中</span></span>
      <span class="tag">SOON</span>
    </div>

  </nav>

  <p class="foot">
    本コンテンツの著作権は一般社団法人日本フィットネス産業協会（FIA）に帰属します。<br>
    複写・転載・再配布を禁止します。
  </p>

</div>
</body>
</html>
